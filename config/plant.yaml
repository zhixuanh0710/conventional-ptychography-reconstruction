# Plant dataset — single-bundle .mat
# Usage: python Recovery.py --config config/plant.yaml

data:
  data_dir: data/plant
  bundle_file: dataset-plant.mat
  gap: 1

physics:
  wavelength: 0.675e-6
  camera_length: 0.0295
  camera_pixel_pitch: 2.96e-5

model:
  downsample_factor: 2
  n_levels: 16
  n_features_per_level: 2
  log2_hashmap_size: 18
  base_resolution: 16
  per_level_scale: 1.5
  hidden_features: 64
  hidden_layers: 2
  first_omega_0: 10.0
  hidden_omega_0: 1.0
  trainable_omega0: true
  # Probe residual init: 'initNone' | 'initProbe' | 'initQuadratic'
  init_type: initNone
  use_residual: true            # ignored when init_type == 'initNone'
  quadratic_focal_length: 0.1   # only used for 'initQuadratic'

training:
  iters: 2000
  batch_size: 10
  lr: 1.0e-3
  lr_decay_step: 10000
  lr_decay_gamma: 0.1
  loss_type: smooth_L1_loss     # smooth_L1_loss | FD_loss | Poisson_likelihood_loss
  use_amp: true
  sparsity_weight: 0.0

output:
  result_dir: results/plant
  vis_interval: 100
  zoom_size: 300
